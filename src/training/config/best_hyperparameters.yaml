diabetes:
  model_type: SVC
  params:
    C: 1.0
    gamma: scale
    class_weight: balanced
    probability: true

heart_disease:
  model_type: random_forest
  params:
    n_estimators: 1119
    max_depth: 5
    min_samples_split: 30
    min_samples_leaf: 11
    max_features: sqrt
    max_samples: 0.6
    bootstrap: true
    ccp_alpha: 0.0017